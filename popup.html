<!DOCTYPE html>
<html data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<div class="container">

  <div class="topbar">
    <div class="tg-pill">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 14.06l-2.945-.918c-.64-.203-.653-.64.136-.954l11.57-4.461c.537-.194 1.006.131.963.494z"/></svg>
      @thogairdrops
    </div>
    <div class="topbar-controls">
      <button class="lang-btn" id="langToggle" title="Switch language">
        <span class="l-en">EN</span>
        <span class="l-id">ID</span>
      </button>
      <button class="theme-btn" id="themeToggle">
        <span class="t-dark">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span data-i18n="dark">Dark</span>
        </span>
        <span class="t-light">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
          <span data-i18n="light">Light</span>
        </span>
      </button>
    </div>
  </div>

  <div class="logo-wrap">
    <div class="thog-mark">
      <svg viewBox="0 0 260 100" class="thog-svg" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="58" height="17" rx="2"/>
        <rect x="18" y="6" width="22" height="72" rx="2"/>
        <rect x="70" y="6" width="18" height="72" rx="2"/>
        <rect x="70" y="40" width="44" height="16" rx="2"/>
        <rect x="114" y="6" width="18" height="72" rx="2"/>
        <circle cx="162" cy="55" r="27"/>
        <circle cx="162" cy="55" r="11" class="svg-cutout"/>
        <circle cx="162" cy="55" r="4"/>
        <path d="M196 14 L240 14 L240 32 L214 32 L214 44 L240 44 L240 80 L196 80 C184 80 178 70 178 56 C178 30 196 14 196 14Z" rx="2"/>
      </svg>
      <div class="airdrop-badge">AIRDROP</div>
    </div>
    <p class="logo-sub" data-i18n="subtitle">Session Extractor</p>
  </div>

  <div class="card">

    <nav class="tabs-nav">
      <button class="tab-btn active" data-tab="user">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span data-i18n="tabUser">User</span>
      </button>
      <button class="tab-btn" data-tab="initdata">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        InitData
      </button>
      <button class="tab-btn" data-tab="token">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span data-i18n="tabToken">Token</span>
      </button>
      <button class="tab-btn" data-tab="iframe">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span data-i18n="tabFrames">Frames</span>
      </button>
    </nav>

    <div class="tab-body">

      <!-- USER TAB -->
      <div class="tab-pane active" id="tab-user">
        <div class="field">
          <div class="field-head">
            <span class="badge badge-u">id</span>
            <span class="field-name">user_id</span>
          </div>
          <div class="inp-row">
            <input id="f-userId" readonly placeholder="——">
            <button class="copy-field" data-field="f-userId">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="badge badge-u">name</span>
            <span class="field-name">first_name</span>
          </div>
          <div class="inp-row">
            <input id="f-firstName" readonly placeholder="——">
            <button class="copy-field" data-field="f-firstName">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="badge badge-u">user</span>
            <span class="field-name">username</span>
          </div>
          <div class="inp-row">
            <input id="f-username" readonly placeholder="——">
            <button class="copy-field" data-field="f-username">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="badge badge-u">phone</span>
            <span class="field-name">phone</span>
          </div>
          <div class="inp-row">
            <input id="f-phone" readonly placeholder="——">
            <button class="copy-field" data-field="f-phone">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="badge badge-p">prem</span>
            <span class="field-name">is_premium</span>
          </div>
          <div class="inp-row">
            <input id="f-isPremium" readonly placeholder="——">
            <button class="copy-field" data-field="f-isPremium">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="badge badge-q">query</span>
            <span class="field-name">query_id</span>
          </div>
          <div class="inp-row">
            <input id="f-queryId" readonly placeholder="——">
            <button class="copy-field" data-field="f-queryId">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- INITDATA TAB -->
      <div class="tab-pane" id="tab-initdata">
        <div class="mono-block-wrap">
          <div class="mono-head">
            <span class="mono-label">init_data</span>
            <button class="copy-btn-sm" id="copyInitData">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <span data-i18n="copy">Copy</span>
            </button>
          </div>
          <textarea id="f-initData" readonly placeholder="— no initData found —" spellcheck="false"></textarea>
        </div>
        <div class="source-tag" id="initDataSource"></div>
      </div>

      <!-- TOKEN TAB -->
      <div class="tab-pane" id="tab-token">
        <div class="list-wrap" id="tokenList">
          <div class="empty-state" data-i18n="noTokens">No tokens extracted yet</div>
        </div>
      </div>

      <!-- IFRAME TAB -->
      <div class="tab-pane" id="tab-iframe">
        <div class="list-wrap" id="frameList">
          <div class="empty-state" data-i18n="noFrames">No frames scanned yet</div>
        </div>
      </div>

    </div>

    <div class="btn-group">
      <button class="btn-main" id="btnExtract">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span data-i18n="extractAll">Extract All</span>
      </button>
      <button class="btn-out" id="btnCopyAll">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        JSON
      </button>
      <button class="btn-out" id="btnClear" title="Clear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>

  </div>

  <div class="status-row" id="statusBar">
    <div class="s-dot" id="sDot"></div>
    <span id="sText" data-i18n="ready">Ready — press Extract All</span>
  </div>

  <div class="footer">
    <a href="https://t.me/thogairdrops" target="_blank">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 14.06l-2.945-.918c-.64-.203-.653-.64.136-.954l11.57-4.461c.537-.194 1.006.131.963.494z"/></svg>
      @thogairdrops
    </a>
    <span>·</span>
    <a href="https://t.me/thogchats" target="_blank">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 14.06l-2.945-.918c-.64-.203-.653-.64.136-.954l11.57-4.461c.537-.194 1.006.131.963.494z"/></svg>
      @thogchats
    </a>
    <span>·</span>
    <span>by <b>Thog</b></span>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
