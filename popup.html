<!DOCTYPE html>
<html data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="brand">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="tg-icon"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 14.06l-2.945-.918c-.64-.203-.653-.64.136-.954l11.57-4.461c.537-.194 1.006.131.963.494z"/></svg>
      <span class="brand-text">Session Extractor</span>
    </div>
    <div class="topbar-controls">
      <button class="ctrl-btn" id="langToggle" title="Switch language">
        <span class="l-en">EN</span>
        <span class="l-id">ID</span>
      </button>
      <button class="ctrl-btn" id="themeToggle">
        <span class="t-dark">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
        <span class="t-light">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        </span>
      </button>
    </div>
  </div>

  <div class="card">

    <nav class="tabs-nav">
      <button class="tab-btn active" data-tab="user" data-i18n="tabUser">User</button>
      <button class="tab-btn" data-tab="initdata">InitData</button>
      <button class="tab-btn" data-tab="token" data-i18n="tabToken">Token</button>
      <button class="tab-btn" data-tab="iframe" data-i18n="tabFrames">Frames</button>
    </nav>

    <div class="tab-body">

      <!-- USER TAB -->
      <div class="tab-pane active" id="tab-user">
        <div class="field">
          <div class="field-head">
            <span class="field-label">user_id</span>
          </div>
          <div class="inp-row">
            <input id="f-userId" readonly placeholder="—">
            <button class="copy-field" data-field="f-userId">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="field-label">first_name</span>
          </div>
          <div class="inp-row">
            <input id="f-firstName" readonly placeholder="—">
            <button class="copy-field" data-field="f-firstName">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="field-label">username</span>
          </div>
          <div class="inp-row">
            <input id="f-username" readonly placeholder="—">
            <button class="copy-field" data-field="f-username">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="field-label">phone</span>
          </div>
          <div class="inp-row">
            <input id="f-phone" readonly placeholder="—">
            <button class="copy-field" data-field="f-phone">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="field-label">is_premium</span>
          </div>
          <div class="inp-row">
            <input id="f-isPremium" readonly placeholder="—">
            <button class="copy-field" data-field="f-isPremium">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <span class="field-label">query_id</span>
          </div>
          <div class="inp-row">
            <input id="f-queryId" readonly placeholder="—">
            <button class="copy-field" data-field="f-queryId">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- INITDATA TAB -->
      <div class="tab-pane" id="tab-initdata">
        <div class="mono-block-wrap">
          <div class="mono-head">
            <span class="mono-label">init_data</span>
            <button class="copy-btn-sm" id="copyInitData">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <span data-i18n="copy">Copy</span>
            </button>
          </div>
          <textarea id="f-initData" readonly placeholder="— no initData found —" spellcheck="false"></textarea>
        </div>
        <div class="source-tag" id="initDataSource"></div>
      </div>

      <!-- TOKEN TAB -->
      <div class="tab-pane" id="tab-token">
        <div class="list-wrap" id="tokenList">
          <div class="empty-state" data-i18n="noTokens">No tokens extracted yet</div>
        </div>
      </div>

      <!-- IFRAME TAB -->
      <div class="tab-pane" id="tab-iframe">
        <div class="list-wrap" id="frameList">
          <div class="empty-state" data-i18n="noFrames">No frames scanned yet</div>
        </div>
      </div>

    </div>

    <div class="btn-group">
      <button class="btn-primary" id="btnExtract">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span data-i18n="extractAll">Extract All</span>
      </button>
      <button class="btn-secondary" id="btnCopyAll">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        JSON
      </button>
      <button class="btn-ghost" id="btnClear" title="Clear">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>

  </div>

  <div class="status-row" id="statusBar">
    <div class="s-dot" id="sDot"></div>
    <span id="sText" data-i18n="ready">Ready — press Extract All</span>
  </div>

  <div class="footer">
    <span>by <b>guajiimi</b></span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/guajiimi/telegram-session-extractor" target="_blank">GitHub</a>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
